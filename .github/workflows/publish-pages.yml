name: Publish static site to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated country codes to publish, for example us,au'
        required: false
        default: 'us,au'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      DEFAULT_COUNTRIES: us,au

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Resolve countries
        id: countries
        run: |
          INPUT_COUNTRIES="${{ github.event.inputs.countries }}"
          if [ -z "$INPUT_COUNTRIES" ]; then INPUT_COUNTRIES="$DEFAULT_COUNTRIES"; fi
          echo "countries=$INPUT_COUNTRIES" >> "$GITHUB_OUTPUT"

      - name: Run publish pipeline
        run: |
          python scripts/run_all_countries.py --countries "${{ steps.countries.outputs.countries }}" --publish-dir site/data

      - name: Validate published outputs
        run: |
          python scripts/validate_outputs.py --countries "${{ steps.countries.outputs.countries }}" --publish-dir site/data

      - name: Validate site manifest
        run: |
          python -c "import json, pathlib; p = pathlib.Path('site/data/manifest.json'); data = json.loads(p.read_text()); assert data['schema_version'] == 1; assert data['artifact_count'] >= 1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          wrangler pages deploy site --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main
