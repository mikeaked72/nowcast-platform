name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
  merge_group:
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          python -m playwright install chromium

      - name: Run tests
        run: |
          pytest -q

      - name: Validate country packs
        run: |
          python scripts/run_country.py --country us --validate-pack-only

      - name: Smoke publish run for US
        run: |
          python scripts/run_country.py --country us --publish-dir runs/publish/us

      - name: Smoke G10 replay publish for US
        run: |
          python -m nowcast.cli g10-replay-experimental-us --vintage-dates 2026-03-01,2026-04-01 --raw-root tests/fixtures/g10_us --vintage-root runs/g10/vintages --processed-root runs/g10/processed --artifact-root runs/g10/artifacts --publish-dir runs/publish --smoke-latest

      - name: Validate published outputs
        run: |
          python scripts/validate_outputs.py --country us --publish-dir runs/publish/us

      - name: Validate G10 replay outputs
        run: |
          python scripts/validate_outputs.py --country us --publish-dir runs/publish

      - name: Validate site manifest
        run: |
          python -c "import json, pathlib; p = pathlib.Path('runs/publish/manifest.json'); data = json.loads(p.read_text()); assert data['schema_version'] == 1; assert data['artifact_count'] >= 1"

      - name: Upload smoke artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-publish-us
          path: runs/publish
          if-no-files-found: ignore
